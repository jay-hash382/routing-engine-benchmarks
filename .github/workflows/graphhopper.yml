name: Benchmark GraphHopper
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Download inputs
        run: |
          mkdir -p data reports
          curl --fail --location --retry 3 -o data/taiwan-latest.osm.pbf https://download.geofabrik.de/asia/taiwan-latest.osm.pbf
          curl --fail --location --retry 3 -o data/graphhopper.jar https://repo1.maven.org/maven2/com/graphhopper/graphhopper-web/11.0/graphhopper-web-11.0.jar
          cp config/graphhopper.yml data/config.yml
          cp scripts/wait-graphhopper.sh data/wait-graphhopper.sh
          chmod +x data/wait-graphhopper.sh
      - name: Build GraphHopper graph
        run: |
          chmod +x scripts/*.sh
          scripts/run-container-benchmark.sh GraphHopper reports/graphhopper.json \
            --name graphhopper-benchmark \
            -v "$PWD/data:/data" \
            eclipse-temurin:21-jre \
            bash -lc 'java -Xms1g -Xmx12g -Ddw.graphhopper.datareader.file=/data/taiwan-latest.osm.pbf -jar /data/graphhopper.jar server /data/config.yml > /data/graphhopper.log 2>&1 & pid=$!; /data/wait-graphhopper.sh "$pid" /data/graphhopper.log'
          scripts/finalize-report.sh reports/graphhopper.json data/taiwan-latest.osm.pbf data/graphhopper
      - name: Smoke route
        run: |
          docker run -d --rm --name graphhopper-smoke -p 8989:8989 -v "$PWD/data:/data" eclipse-temurin:21-jre bash -lc 'java -Xms512m -Xmx4g -jar /data/graphhopper.jar server /data/config.yml'
          for i in {1..60}; do curl -fsS 'http://127.0.0.1:8989/route?point=22.6273,120.3014&point=24.1477,120.6848&profile=car&points_encoded=false' -o reports/graphhopper-route.json && break; sleep 1; done
          jq -e '(.paths | length) > 0' reports/graphhopper-route.json
          docker stop graphhopper-smoke
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: graphhopper-report
          path: |
            reports/
            data/graphhopper.log
          retention-days: 14
