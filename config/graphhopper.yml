graphhopper:
  datareader.file: /data/taiwan-latest.osm.pbf
  graph.location: /data/graphhopper
  graph.encoded_values: car_access, car_average_speed
  profiles:
    - name: car
      custom_model_files: [car.json]
  profiles_ch:
    - profile: car
  import.osm.ignored_highways: footway,construction,cycleway,path,steps
server:
  application_connectors:
    - type: http
      port: 8989
  admin_connectors:
    - type: http
      port: 8990
